  product: windows
detection:
  selection:
    Image|contains:
      - 'Cookies'
      - 'logins.json'
      - 'key3.db'
      - 'key4.db'
      - 'cert8.db'
      - 'cert9.db'
      - 'signons.sqlite'
      - 'chrome.exe'
      - 'msedge.exe'
      - 'firefox.exe'
      - 'brave.exe'
      - 'opera.exe'
      - 'vivaldi.exe'
      - 'arc.exe'
      - 'msedgewebview2.exe'
  condition: selection
falsepositives:
  - Legitimate use of any of the above strings on dev / admin hosts
  - Tune via known-good allowlist before alerting
level: high
