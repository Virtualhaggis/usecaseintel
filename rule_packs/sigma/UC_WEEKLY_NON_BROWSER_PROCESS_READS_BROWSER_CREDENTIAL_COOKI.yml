title: [WEEKLY] Non-Browser Process Reads Browser Credential / Cookie SQLite Then Egresses to Public Destination Within 10 Minutes
id: UC_WEEKLY_NON_BROWSER_PROCESS_READS_BROWSER_CREDENTIAL_COOKI
status: experimental
description: Detects the joint actions-on-objectives pattern shared across this fortnight's 12 intrusion reports: a process that is NOT a known web-browser binary opens one of the Chromium / Edge / Gecko credential or cookie stores (Login Data, Cookies, Web Data, Local State, logins.json, key4.db) and, within 10 minutes, the same PID initiates an outbound TCP/HTTP/HTTPS connection to a public IP. This fortnight the pattern is driven by the fake-OpenClaw infostealer that hunts 250+ browser/wallet extensions, the DEEP#DOOR Python backdoor exfiltrating browser & cloud creds via bore.pub tunneling, the TeamPCP / Mini Shai-Hulud supply-chain compromises of @cap-js SAP packages and PyTorch-Lightning v2.6.2/2.6.3 that drop Bun runtimes to grab tokens, CloudZ RAT + Pheno staging at C:\ProgramData\Microsoft\whealth\ to siphon Phone Link OTPs, MuddyWater's Stagecomp/Darkcomp Teams-delivered loaders, UAT-8302's wagent.exe collector against government browsers, the event-invitation phishing kits, and PamDOORa's post-PAM-hijack browser fan-out on Linux. Kill-chain stages spanned: Collection (T1555.003 / T1539 / T1005) → Exfiltration (T1041 / T1567 / T1071.001). It WILL fire on stealers, RAT collectors and supply-chain payloads that read those files from python.exe / node.exe / bun.exe / pwsh.exe / custom .exes; it will NOT fire on the browser process itself, on baselined EDR / AV / backup readers (allowlisted), on credential reads with no egress (those surface as a hunting drop-rule), or on egress without a prior credential read.
references:
  - https://clankerusecase.com/use_cases/actions/UC_WEEKLY_NON_BROWSER_PROCESS_READS_BROWSER_CREDENTIAL_COOKI.yml
