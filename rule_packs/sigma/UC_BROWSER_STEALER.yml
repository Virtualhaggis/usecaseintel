title: Infostealer — non-browser process accessing browser cookie/login DBs
id: UC_BROWSER_STEALER
status: experimental
description: Stealers (RedLine, Lumma, Vidar, Atomic) read Login Data / cookies SQLite from Chrome/Edge/Firefox.
references:
  - https://github.com/Virtualhaggis/usecaseintel/blob/main/use_cases/actions/UC_BROWSER_STEALER.yml
author: usecaseintel auto-generator
tags:
  - usecaseintel.tier.alerting
