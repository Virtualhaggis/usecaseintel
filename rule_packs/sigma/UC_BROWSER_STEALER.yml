  - attack.t1539
  - attack.t1555_003
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|contains:
      - 'chrome.exe'
      - 'msedge.exe'
      - 'firefox.exe'
      - 'brave.exe'
      - 'opera.exe'
      - '\\Mozilla\\Firefox\\Profiles\\'
      - 'Cookies'
      - 'logins.json'
      - 'cookies.sqlite'
  condition: selection
falsepositives:
  - Legitimate use of any of the above strings on dev / admin hosts
  - Tune via known-good allowlist before alerting
level: high
