detection:
  selection:
    Image|contains:
      - 'allowed'
      - 'internal'
      - 'powershell.exe'
      - 'pwsh.exe'
      - 'mshta.exe'
      - 'rundll32.exe'
      - 'regsvr32.exe'
      - 'cscript.exe'
      - 'wscript.exe'
      - 'cmd.exe'
      - 'bitsadmin.exe'
      - 'certutil.exe'
      - 'curl.exe'
      - 'wget.exe'
      - 'msiexec.exe'
  condition: selection
falsepositives:
  - Legitimate use of any of the above strings on dev / admin hosts
  - Tune via known-good allowlist before alerting
level: high
