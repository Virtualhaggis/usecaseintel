[usecaseintel - [WEEKLY] Non-Browser Process Reads Browser Credential / Cookie SQLite Then Egresses to Public Destination Within 10 Minutes]
description = Detects the joint actions-on-objectives pattern shared across this fortnight's 12 intrusion reports: a process that is NOT a known web-browser binary opens one of the Chromium / Edge / Gecko credential or cookie stores (Login Data, Cookies, Web Data, Local State, logins.json, key4.db) and, within 10 minutes, the same PID initiates an outbound TCP/HTTP/HTTPS connection to a public IP. This fortnight the pattern is driven by the fake-OpenClaw infostealer that hunts 250+ browser/wallet extensions, the DEEP#DOOR Python backdoor exfiltrating browser & cloud creds via bore.pub tunneling, the TeamPCP / Mini Shai-Hulud supply-chain compromises of @cap-js SAP packages and PyTorch-Lightning v2.6.2/2.6.3 that drop Bun runtimes to grab tokens, CloudZ RAT + Pheno staging at C:\ProgramData\Microsoft\whealth\ to siphon Phone Link OTPs, MuddyWater's Stagecomp/Darkcomp Teams-delivered loaders, UAT-8302's wagent.exe collector against government browsers, the event-invitation phishing kits, and PamDOORa's post-PAM-hijack browser fan-out on Linux. Kill-chain stages spanned: Collection (T1555.003 / T1539 / T1005) → Exfiltration (T1041 / T1567 / T1071.001). It WILL fire on stealers, RAT collectors and supply-chain payloads that read those files from python.exe / node.exe / bun.exe / pwsh.exe / custom .exes; it will NOT fire on the browser process itself, on baselined EDR / AV / backup readers (allowlisted), on credential reads with no egress (those surface as a hunting drop-rule), or on egress without a prior credential read.
search = | tstats summariesonly=t count min(_time) as firstFile values(Filesystem.file_path) as cred_files from datamodel=Endpoint.Filesystem where (Filesystem.file_name IN ("Login Data","Login Data For Account","Cookies","Web Data","Local State","logins.json","key3.db","key4.db","cert8.db","cert9.db","signons.sqlite") OR Filesystem.file_path IN ("*\\Google\\Chrome\\User Data\\*\\Login Data*","*\\Google\\Chrome\\User Data\\*\\Cookies*","*\\Google\\Chrome\\User Data\\*\\Web Data*","*\\Microsoft\\Edge\\User Data\\*\\Login Data*","*\\Microsoft\\Edge\\User Data\\*\\Cookies*","*\\BraveSoftware\\Brave-Browser\\User Data\\*\\Login Data*","*\\Mozilla\\Firefox\\Profiles\\*\\logins.json","*\\Mozilla\\Firefox\\Profiles\\*\\key4.db","/home/*/.config/google-chrome/*/Login Data","/home/*/.config/google-chrome/*/Cookies","/home/*/.mozilla/firefox/*/logins.json","/home/*/.mozilla/firefox/*/key4.db","/Users/*/Library/Application Support/Google/Chrome/*/Login Data","/Users/*/Library/Application Support/Firefox/Profiles/*/logins.json")) AND NOT Filesystem.process_name IN ("chrome.exe","msedge.exe","firefox.exe","brave.exe","opera.exe","vivaldi.exe","arc.exe","msedgewebview2.exe","iexplore.exe","chrome","firefox","MsMpEng.exe","MpCmdRun.exe","NisSrv.exe","TrustedInstaller.exe","SearchProtocolHost.exe","SenseIR.exe","MsSense.exe","SenseNdr.exe","CSFalconService.exe","CarbonBlack.exe","explorer.exe") AND NOT match(Filesystem.user, "(?i).*\\$$") by host Filesystem.process_guid Filesystem.process_name Filesystem.process_path Filesystem.user Filesystem.file_path Filesystem.file_name | `drop_dm_object_name(Filesystem)` | rename process_guid as src_guid | join type=inner host src_guid [ | tstats summariesonly=t count as net_count values(All_Traffic.dest_ip) as dst_ips values(All_Traffic.dest) as dst values(All_Traffic.dest_port) as ports min(_time) as firstNet from datamodel=Network_Traffic.All_Traffic where All_Traffic.dest_category!="internal" AND All_Traffic.action!="blocked" by host All_Traffic.process_guid | `drop_dm_object_name(All_Traffic)` | rename process_guid as src_guid ] | eval delaySec = firstNet - firstFile | where delaySec >= 0 AND delaySec <= 600 | table host user process_name process_path file_path file_name cred_files dst_ips dst ports firstFile firstNet delaySec | `security_content_ctime(firstFile)` | `security_content_ctime(firstNet)`
