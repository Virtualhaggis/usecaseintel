[usecaseintel - Beaconing — periodic outbound to small set of destinations]
description = C2 channel detection via inter-beacon-time stddev / fan-out to single dest.
search = | tstats `summariesonly` count, values(All_Traffic.dest_port) AS ports
# (full multi-line search below)
#   | tstats `summariesonly` count, values(All_Traffic.dest_port) AS ports
#       from datamodel=Network_Traffic.All_Traffic
#       where All_Traffic.action="allowed" AND All_Traffic.dest_category!="internal"
#       by _time span=10s, All_Traffic.src, All_Traffic.dest
#   | `drop_dm_object_name(All_Traffic)`
#   | streamstats current=f last(_time) AS prev_time by src, dest
#   | eval delta = _time - prev_time
#   | stats avg(delta) AS avg_delta stdev(delta) AS sd_delta count by src, dest
#   | where count > 30 AND sd_delta < 5 AND avg_delta>=30 AND avg_delta<=600
#   | sort - count
cron_schedule = 0 */6 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 0  # ENABLE AFTER REVIEW (tier=alerting)
action.notable = 1
action.notable.param.severity = high
action.notable.param.security_domain = endpoint
action.correlationsearch.annotations = {"mitre_attack":[T1071.001,T1071.004]}
# usecaseintel.tier = alerting
# usecaseintel.fp_rate = medium

