[usecaseintel - [WEEKLY] Cross-Platform ClickFix Paste-to-Pipe Loader (UI-Parent Shell with Decode-and-Execute Payload)]
description = Detects an interactive UI surface (web browser, file-explorer Run dialog, or terminal emulator) spawning a command interpreter whose command line carries a one-shot decode-and-pipe loader signature — base64-decode piped to a shell, curl/wget piped to bash/sh/python, PowerShell `-EncodedCommand` / `FromBase64String` / `IEX DownloadString` cradles, or `osascript -e` with encoded payload. This fortnight the technique drives the delivery stage across most of the catalogue: the New Linux PamDOORa Backdoor explicitly distributes via T1204.004 paste-to-shell, Quasar Linux RAT (QLNX) uses the same vector to land on developer hosts, TCLBANKER chains it into a banking-trojan installer, and both the One Click / Patient Zero webinar piece and the 25M Alerts retrospective name ClickFix as the dominant 2026 Patient-Zero technique. The UC spans the delivery and execution kill-chain stages in a single event window because, for ClickFix, the clipboard paste IS the delivery and the spawned pipeline IS the execution. It fires when the parent is an interactive UI process AND the child is a shell/interpreter AND the command line contains a decode-and-execute pattern — the textbook ClickFix signature. It will NOT fire on scripted automation where the shell's parent is sshd / cron / systemd / a build agent, nor on PowerShell launched from a console host with a static cmdline (no decode primitive), so DevOps scripted pipelines, scheduled installers, and admin SSH sessions are excluded by construction.
search = | tstats `summariesonly` count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as cmd values(Processes.parent_process) as parent_cmd values(Processes.user) as user from datamodel=Endpoint.Processes where Processes.parent_process_name IN ("explorer.exe","chrome.exe","msedge.exe","firefox.exe","brave.exe","safari","Safari","Terminal","Terminal.app","gnome-terminal","gnome-terminal-server","konsole","xterm","iTerm2","WindowsTerminal.exe","wt.exe") AND Processes.process_name IN ("powershell.exe","pwsh.exe","cmd.exe","bash","sh","zsh","dash","osascript","python","python3","perl") AND (Processes.process="*base64 -d*|*" OR Processes.process="*base64 --decode*|*" OR Processes.process="*echo *|*base64*|*" OR Processes.process="*curl *|*sh*" OR Processes.process="*curl *|*bash*" OR Processes.process="*curl *|*python*" OR Processes.process="*wget *|*sh*" OR Processes.process="*wget *|*bash*" OR Processes.process="*-EncodedCommand*" OR Processes.process="* -enc *" OR Processes.process="*FromBase64String*" OR Processes.process="*DownloadString(*" OR Processes.process="*IEX(*" OR Processes.process="*Invoke-Expression*" OR Processes.process="*iwr *-useb*" OR Processes.process="*osascript -e*do shell script*") by Processes.dest Processes.user Processes.process_name Processes.process Processes.parent_process_name Processes.parent_process | `drop_dm_object_name(Processes)` | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
# (full multi-line search below)
#   | tstats `summariesonly` count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as cmd values(Processes.parent_process) as parent_cmd values(Processes.user) as user from datamodel=Endpoint.Processes where Processes.parent_process_name IN ("explorer.exe","chrome.exe","msedge.exe","firefox.exe","brave.exe","safari","Safari","Terminal","Terminal.app","gnome-terminal","gnome-terminal-server","konsole","xterm","iTerm2","WindowsTerminal.exe","wt.exe") AND Processes.process_name IN ("powershell.exe","pwsh.exe","cmd.exe","bash","sh","zsh","dash","osascript","python","python3","perl") AND (Processes.process="*base64 -d*|*" OR Processes.process="*base64 --decode*|*" OR Processes.process="*echo *|*base64*|*" OR Processes.process="*curl *|*sh*" OR Processes.process="*curl *|*bash*" OR Processes.process="*curl *|*python*" OR Processes.process="*wget *|*sh*" OR Processes.process="*wget *|*bash*" OR Processes.process="*-EncodedCommand*" OR Processes.process="* -enc *" OR Processes.process="*FromBase64String*" OR Processes.process="*DownloadString(*" OR Processes.process="*IEX(*" OR Processes.process="*Invoke-Expression*" OR Processes.process="*iwr *-useb*" OR Processes.process="*osascript -e*do shell script*") by Processes.dest Processes.user Processes.process_name Processes.process Processes.parent_process_name Processes.parent_process | `drop_dm_object_name(Processes)` | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
#
