[usecaseintel - [WEEKLY] Cross-category credential-store enumeration with rapid egress to anonymizing tunnel/CDN]
description = Detects a single endpoint process that touches credential material from THREE or more distinct categories — browser logins/cookies, DevOps & cloud secrets (.aws, .kube, .npmrc, .pypirc, .docker, .git-credentials, .netrc), SSH private keys, DPAPI/Vault/Credential-Manager stores, password-manager vaults, or crypto-wallet directories — within a 5-minute window, AND the same host egresses to an anonymizing tunnel or CDN (bore.pub, *.trycloudflare.com, *.ngrok.io, *.workers.dev, *.web.app, pastebin/transfer.sh, Telegram API) within 10 minutes of the last credential read. This fortnight saw at least eight distinct intrusion lures converge on identical actions-on-objectives: PCPJack cloud-worm and TeamPCP-eviction (SentinelLabs, BleepingComputer 2026-05-07), PamDOORa PAM backdoor on Linux (THN/CSN 2026-05-08), QLNX Quasar Linux RAT (THN 2026-05-08), MuddyWater Teams-vishing false-flag ransomware (THN 2026-05-06), CloudZ RAT/Pheno plugin via Windows Phone Link (THN 2026-05-06), DEEP#DOOR Python backdoor exfilling over bore.pub (THN 2026-04-30), malicious NuGet packages (CSN 2026-05-07), Fake OpenClaw installer hitting 250+ extensions (CSN 2026-05-08), event-invitation phishing (CSN 2026-05-07), and the SAP-npm supply-chain compromise (BleepingComputer 2026-04-29) — all delivery paths differ but the collection+exfiltration stage is the same heterogeneous-secret fan-out followed by tunneled egress. Spans Collection (T1555/T1552/T1539) and Exfiltration (T1041/T1567/T1572) — the only two kill-chain stages every article shares. FIRES when one process_guid (or PID on the same host within 60s) reads ≥3 distinct credential CATEGORIES then the host egresses to a tunneling/CDN host or otherwise-rare public destination. DOES NOT FIRE on browsers reading only their own cookie/Login-Data store, native password managers reading their own vault, git/aws-cli/kubectl/npm reading a single category for legitimate use, or baselined backup/EDR/SCM agents.
