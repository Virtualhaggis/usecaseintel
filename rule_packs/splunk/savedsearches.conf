[usecaseintel - [WEEKLY] Linux LPE chain — anomalous algif_aead/esp4/esp6/rxrpc kernel-module load followed by same-user root transition]
description = Detects the behavioural pattern shared by CVE-2026-31431 'Copy Fail' (Theori, April 30; CISA KEV May 1; active exploitation by May 4) and its 'Dirty Frag' successor (CVE-2026-43284 esp4/esp6, CVE-2026-43500 rxrpc; PoC May 7-8 per Microsoft Defender, Unit 42 and Cyber Security News): an unprivileged Linux user triggers an autoload or explicit modprobe/insmod of an otherwise-rare networking/crypto kernel module (algif_aead, esp4, esp6, rxrpc, xfrm_user, af_alg) and within 10 minutes a process owned by that same user spawns a root-owned child or transitions to euid=0 on the same host. The chain spans the exploit phase (T1068 privilege escalation via kernel-module abuse / T1547.006) and is the convergence point Microsoft, Unit 42 and CISA all called out this fortnight regardless of how the unprivileged shell was obtained (web RCE per Article 6 PAN-OS, container break-out per Article 11, malicious package per Article 2's supply-chain framing, or AI-agent RCE per Article 9). Fires when stage 1 (kmod load) and stage 2 (root transition by the same actor) both occur within the correlation window; will NOT fire on routine boot-time module loads by systemd-modules-load/udevd, on dpkg/apt/yum/snapd/unattended-upgrade installs, on configuration-management agents (ansible/puppet/chef/salt) bringing modules in, or on root sessions where no anomalous kmod load preceded.
search = | tstats summariesonly=true count min(_time) AS stage1_time values(Processes.process) AS kmod_cmd values(Processes.parent_process_name) AS kmod_parent FROM datamodel=Endpoint.Processes WHERE Processes.os=Linux Processes.process_name IN ("modprobe","insmod","kmod") (Processes.process="*algif_aead*" OR Processes.process="*esp4*" OR Processes.process="*esp6*" OR Processes.process="*rxrpc*" OR Processes.process="*xfrm_user*" OR Processes.process="*af_alg*") BY host Processes.user | `drop_dm_object_name(Processes)` | where NOT match(kmod_parent,"(?i)^(systemd|systemd-udevd|udevd|init|kmod|systemd-modules-load|dpkg|apt|apt-get|yum|dnf|zypper|snapd|unattended-upgrade|ansible-playbook|puppet|chef-client|salt-minion)$") | where user!="root" AND NOT match(user,"\\$$") | rename user AS stage1_user | join host [| tstats summariesonly=true count min(_time) AS stage2_time values(Processes.process) AS root_cmd values(Processes.process_name) AS root_proc values(Processes.parent_process_name) AS root_parent FROM datamodel=Endpoint.Processes WHERE Processes.os=Linux Processes.user="root" AND Processes.parent_process_name NOT IN ("systemd","init","cron","crond","sshd","login","getty","agetty","gdm","gdm3","lightdm","systemd-logind","dbus-daemon","rsyslogd") BY host] | where stage2_time>=stage1_time AND stage2_time<=relative_time(stage1_time,"+10m") | eval delay_sec=stage2_time-stage1_time | table host stage1_user stage1_time kmod_cmd kmod_parent stage2_time delay_sec root_proc root_cmd root_parent | sort - stage1_time
# (full multi-line search below)
#   | tstats summariesonly=true count min(_time) AS stage1_time values(Processes.process) AS kmod_cmd values(Processes.parent_process_name) AS kmod_parent FROM datamodel=Endpoint.Processes WHERE Processes.os=Linux Processes.process_name IN ("modprobe","insmod","kmod") (Processes.process="*algif_aead*" OR Processes.process="*esp4*" OR Processes.process="*esp6*" OR Processes.process="*rxrpc*" OR Processes.process="*xfrm_user*" OR Processes.process="*af_alg*") BY host Processes.user | `drop_dm_object_name(Processes)` | where NOT match(kmod_parent,"(?i)^(systemd|systemd-udevd|udevd|init|kmod|systemd-modules-load|dpkg|apt|apt-get|yum|dnf|zypper|snapd|unattended-upgrade|ansible-playbook|puppet|chef-client|salt-minion)$") | where user!="root" AND NOT match(user,"\\$$") | rename user AS stage1_user | join host [| tstats summariesonly=true count min(_time) AS stage2_time values(Processes.process) AS root_cmd values(Processes.process_name) AS root_proc values(Processes.parent_process_name) AS root_parent FROM datamodel=Endpoint.Processes WHERE Processes.os=Linux Processes.user="root" AND Processes.parent_process_name NOT IN ("systemd","init","cron","crond","sshd","login","getty","agetty","gdm","gdm3","lightdm","systemd-logind","dbus-daemon","rsyslogd") BY host] | where stage2_time>=stage1_time AND stage2_time<=relative_time(stage1_time,"+10m") | eval delay_sec=stage2_time-stage1_time | table host stage1_user stage1_time kmod_cmd kmod_parent stage2_time delay_sec root_proc root_cmd root_parent | sort - stage1_time
#
# --- Non-summarised variant (no CIM acceleration required) ---
# Replace the `search =` line above with the body below if your
# environment doesn't have CIM data-model acceleration enabled.
#   | tstats summariesonly=false count min(_time) AS stage1_time values(Processes.process) AS kmod_cmd values(Processes.parent_process_name) AS kmod_parent FROM datamodel=Endpoint.Processes WHERE Processes.os=Linux Processes.process_name IN ("modprobe","insmod","kmod") (Processes.process="*algif_aead*" OR Processes.process="*esp4*" OR Processes.process="*esp6*" OR Processes.process="*rxrpc*" OR Processes.process="*xfrm_user*" OR Processes.process="*af_alg*") BY host Processes.user | `drop_dm_object_name(Processes)` | where NOT match(kmod_parent,"(?i)^(systemd|systemd-udevd|udevd|init|kmod|systemd-modules-load|dpkg|apt|apt-get|yum|dnf|zypper|snapd|unattended-upgrade|ansible-playbook|puppet|chef-client|salt-minion)$") | where user!="root" AND NOT match(user,"\\$$") | rename user AS stage1_user | join host [| tstats summariesonly=false count min(_time) AS stage2_time values(Processes.process) AS root_cmd values(Processes.process_name) AS root_proc values(Processes.parent_process_name) AS root_parent FROM datamodel=Endpoint.Processes WHERE Processes.os=Linux Processes.user="root" AND Processes.parent_process_name NOT IN ("systemd","init","cron","crond","sshd","login","getty","agetty","gdm","gdm3","lightdm","systemd-logind","dbus-daemon","rsyslogd") BY host] | where stage2_time>=stage1_time AND stage2_time<=relative_time(stage1_time,"+10m") | eval delay_sec=stage2_time-stage1_time | table host stage1_user stage1_time kmod_cmd kmod_parent stage2_time delay_sec root_proc root_cmd root_parent | sort - stage1_time
cron_schedule = 0 */6 * * *
dispatch.earliest_time = -24h@h
