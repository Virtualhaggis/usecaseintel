[usecaseintel - [WEEKLY] Internet-Facing Service Process Spawning Unix Shell or Ingress-Tool LOLBin (Edge Zero-Day Post-Exploit)]
description = Detects the canonical post-exploit transition on internet-facing edge appliances and Linux servers: a service process (PAN-OS sslmgr/useridd/authd, Ivanti EPMM mifs/tomcat/java/catalina, Apache/Nginx, sshd, generic node/python application servers) directly spawns a Unix shell interpreter or an ingress-tool LOLBin (bash/sh/python/perl/curl/wget/nc/socat/busybox) with a non-automation parent. This fortnight three high-severity zero-days dominated the briefings — CVE-2026-0300 PAN-OS Captive Portal unauthenticated RCE exploited in-the-wild since April (Unit 42 'Threat Brief: Exploitation of PAN-OS Captive Portal Zero-Day', Cyber Security News 'Palo Alto Networks Firewall Zero-Day RCE', BleepingComputer 'Palo Alto Networks firewall zero-day exploited for nearly a month'), CVE-2026-6973 Ivanti EPMM remote-code-execution under CISA four-day emergency directive (BleepingComputer 'CISA gives feds four days to patch Ivanti flaw', 'Ivanti warns of new EPMM flaw'), and the Linux kernel 'Dirty Frag' LPE (BleepingComputer 8 May) — all set against the 'Patient Zero', 'Day Zero Readiness', and 'After Mythos' essays from The Hacker News framing edge compromise as the new front door, plus the 'Zero-Auth' Schemata API and Android CVE-2026-0073 RCE pieces that share the same exploit→post-exploit shape. The chain spans MITRE exploit (T1190) → install (T1505.003 webshell or T1059.004 shell) → C2 staging (T1105 / T1572 reverse-tunnel like the EarthWorm reversesocks5 dropper described by Unit 42); the inbound exploit is invisible at the endpoint, but the resulting service→shell parentage is unmistakable. It fires when sslmgr/useridd/mifs/tomcat/java/sshd/httpd/nginx are the direct parent of bash/sh/python/curl/wget/nc with non-trivial command lines; it does NOT fire on routine sysadmin maintenance (interactive parents like login/sudo), on configuration-management tools (puppet/ansible/chef/salt-minion explicitly excluded), or on health-check style invocations (`status`, `--version`, `health`).
search = | tstats `summariesonly` count min(_time) AS firstTime max(_time) AS lastTime values(Processes.process) AS cmdlines values(Processes.process_path) AS exec_paths values(Processes.parent_process) AS parent_cmds from datamodel=Endpoint.Processes where Processes.parent_process_name IN ("httpd","nginx","apache2","java","tomcat","sslmgr","useridd","authd","mifs","node","python","python3","sshd","pan_comm_mgr","panlogd","catalina.sh","ws_TomcatService.sh") AND Processes.process_name IN ("bash","sh","csh","zsh","dash","ksh","tcsh","python","python3","perl","ruby","curl","wget","nc","ncat","socat","busybox","gawk") by Processes.dest Processes.user Processes.parent_process_name Processes.process_name Processes.process Processes.parent_process | `drop_dm_object_name(Processes)` | where NOT match(parent_process,"(?i)(puppet|ansible|chef-client|salt-minion|systemd|/cron[/ ]|crond)") AND NOT match(process,"(?i)(\s--version|\sstatus(\s|$)|\shealthcheck|\s-V(\s|$))") | join type=inner dest [| tstats `summariesonly` count from datamodel=Endpoint.Filesystem where Filesystem.action="created" AND (Filesystem.file_path="*/webapps/*" OR Filesystem.file_path="*/htdocs/*" OR Filesystem.file_path="*/www/*" OR Filesystem.file_path="*/mi/tomcat/*") AND (Filesystem.file_name="*.jsp" OR Filesystem.file_name="*.jspx" OR Filesystem.file_name="*.php" OR Filesystem.file_name="*.aspx" OR Filesystem.file_name="*.sh") by Filesystem.dest Filesystem.file_path Filesystem.file_name | `drop_dm_object_name(Filesystem)` | rename dest AS dest] | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | sort - lastTime
# (full multi-line search below)
#   | tstats `summariesonly` count min(_time) AS firstTime max(_time) AS lastTime values(Processes.process) AS cmdlines values(Processes.process_path) AS exec_paths values(Processes.parent_process) AS parent_cmds from datamodel=Endpoint.Processes where Processes.parent_process_name IN ("httpd","nginx","apache2","java","tomcat","sslmgr","useridd","authd","mifs","node","python","python3","sshd","pan_comm_mgr","panlogd","catalina.sh","ws_TomcatService.sh") AND Processes.process_name IN ("bash","sh","csh","zsh","dash","ksh","tcsh","python","python3","perl","ruby","curl","wget","nc","ncat","socat","busybox","gawk") by Processes.dest Processes.user Processes.parent_process_name Processes.process_name Processes.process Processes.parent_process | `drop_dm_object_name(Processes)` | where NOT match(parent_process,"(?i)(puppet|ansible|chef-client|salt-minion|systemd|/cron[/ ]|crond)") AND NOT match(process,"(?i)(\s--version|\sstatus(\s|$)|\shealthcheck|\s-V(\s|$))") | join type=inner dest [| tstats `summariesonly` count from datamodel=Endpoint.Filesystem where Filesystem.action="created" AND (Filesystem.file_path="*/webapps/*" OR Filesystem.file_path="*/htdocs/*" OR Filesystem.file_path="*/www/*" OR Filesystem.file_path="*/mi/tomcat/*") AND (Filesystem.file_name="*.jsp" OR Filesystem.file_name="*.jspx" OR Filesystem.file_name="*.php" OR Filesystem.file_name="*.aspx" OR Filesystem.file_name="*.sh") by Filesystem.dest Filesystem.file_path Filesystem.file_name | `drop_dm_object_name(Filesystem)` | rename dest AS dest] | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | sort - lastTime
#
# --- Non-summarised variant (no CIM acceleration required) ---
# Replace the `search =` line above with the body below if your
# environment doesn't have CIM data-model acceleration enabled.
#   | tstats summariesonly=false count min(_time) AS firstTime max(_time) AS lastTime values(Processes.process) AS cmdlines values(Processes.process_path) AS exec_paths values(Processes.parent_process) AS parent_cmds from datamodel=Endpoint.Processes where Processes.parent_process_name IN ("httpd","nginx","apache2","java","tomcat","sslmgr","useridd","authd","mifs","node","python","python3","sshd","pan_comm_mgr","panlogd","catalina.sh","ws_TomcatService.sh") AND Processes.process_name IN ("bash","sh","csh","zsh","dash","ksh","tcsh","python","python3","perl","ruby","curl","wget","nc","ncat","socat","busybox","gawk") by Processes.dest Processes.user Processes.parent_process_name Processes.process_name Processes.process Processes.parent_process | `drop_dm_object_name(Processes)` | where NOT match(parent_process,"(?i)(puppet|ansible|chef-client|salt-minion|systemd|/cron[/ ]|crond)") AND NOT match(process,"(?i)(\s--version|\sstatus(\s|$)|\shealthcheck|\s-V(\s|$))") | join type=inner dest [| tstats summariesonly=false count from datamodel=Endpoint.Filesystem where Filesystem.action="created" AND (Filesystem.file_path="*/webapps/*" OR Filesystem.file_path="*/htdocs/*" OR Filesystem.file_path="*/www/*" OR Filesystem.file_path="*/mi/tomcat/*") AND (Filesystem.file_name="*.jsp" OR Filesystem.file_name="*.jspx" OR Filesystem.file_name="*.php" OR Filesystem.file_name="*.aspx" OR Filesystem.file_name="*.sh") by Filesystem.dest Filesystem.file_path Filesystem.file_name | `drop_dm_object_name(Filesystem)` | rename dest AS dest] | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)` | sort - lastTime
