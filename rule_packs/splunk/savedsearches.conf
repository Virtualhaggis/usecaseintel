[usecaseintel - [WEEKLY] Internet-facing service process spawns shell/LOLBin within minutes of public inbound connection — post-RCE command execution]
description = Detects the post-exploitation behavioural fingerprint shared by every public-facing-app RCE in this fortnight: a long-running server, daemon, or middleware process (httpd/nginx/apache2, java/tomcat, node, w3wp, php-fpm, sshd, xrdp, panos_pkt_srv, mifs, python/dotnet AI-agent hosts) spawning an interactive shell or reconnaissance LOLBin (cmd, powershell, sh/bash, curl/wget/certutil/bitsadmin, whoami/id/uname) within 10 minutes of an inbound connection from a public IP to that host. The driving campaigns are CVE-2026-0300 (PAN-OS User-ID Captive Portal, exploited since April per Palo Alto / Cyber Security News / The Hacker News), CVE-2026-6973 (Ivanti EPMM), CVE-2026-23918 (Apache HTTPD double-free), CVE-2026-3854 (GitHub git-push -o injection), CVE-2026-22679 (Weaver E-cology dubboApi), CVE-2026-27174 (MajorDoMo /admin.php), CVE-2026-3965/4047 (Qinglong scheduler crypto-mining), CVE-2025-68670 (xrdp pre-auth), and CVE-2026-26030 / 25592 / 31431 (Microsoft Semantic Kernel and other AI-agent-framework RCEs). The chain spans exploit (T1190) and the immediately following actions/install stages: although every CVE has different IOCs and entry points, all 12 articles converge on the same post-exploit pivot — the service process drops to shell to stage tooling. WILL fire on httpd spawning /bin/sh shortly after a public-IP HTTPS hit, panos_pkt_srv spawning curl, or python.exe (Semantic Kernel host) launching cmd.exe after an inbound API call. WILL NOT fire on cron/systemd-triggered scripts (no preceding inbound public connection), pre-forked CGI workers spawned at boot, intra-org admin SSH (private-IP source filtered out), or service-account contexts where the parent isn't on the internet-facing service list.
search = | tstats `summariesonly` count min(_time) as proc_time values(Processes.process) as cmdline values(Processes.parent_process) as parent_cmdline from datamodel=Endpoint.Processes where Processes.parent_process_name IN ("httpd","httpd.exe","nginx","nginx.exe","apache2","apache.exe","java","java.exe","tomcat.exe","node","node.exe","w3wp.exe","php-fpm","php-fpm7","php-fpm8","sshd","xrdp","mifs","panos_pkt_srv","gunicorn","uwsgi","python","python.exe","python3","pythonw.exe","dotnet.exe","ruby","ruby.exe") AND Processes.process_name IN ("cmd.exe","powershell.exe","pwsh.exe","mshta.exe","rundll32.exe","regsvr32.exe","wscript.exe","cscript.exe","bitsadmin.exe","certutil.exe","curl.exe","wget.exe","whoami.exe","net.exe","systeminfo.exe","sh","bash","dash","zsh","ksh","curl","wget","whoami","id","uname","python","python3","perl") AND NOT Processes.user="*$" by Processes.dest Processes.user Processes.parent_process_name Processes.process_name | `drop_dm_object_name(Processes)` | rename dest as host | join type=inner host [ | tstats `summariesonly` min(_time) as net_time values(All_Traffic.src) as src_ip values(All_Traffic.dest_port) as dest_port from datamodel=Network_Traffic.All_Traffic where All_Traffic.action!="blocked" AND All_Traffic.action!="deny" AND All_Traffic.action!="drop" AND NOT (cidrmatch("10.0.0.0/8",All_Traffic.src) OR cidrmatch("172.16.0.0/12",All_Traffic.src) OR cidrmatch("192.168.0.0/16",All_Traffic.src) OR cidrmatch("127.0.0.0/8",All_Traffic.src) OR cidrmatch("169.254.0.0/16",All_Traffic.src) OR cidrmatch("100.64.0.0/10",All_Traffic.src)) by All_Traffic.dest | `drop_dm_object_name(All_Traffic)` | rename dest as host ] | eval delay_sec=proc_time-net_time | where delay_sec>=0 AND delay_sec<=600 | table host user parent_process_name process_name cmdline parent_cmdline src_ip dest_port delay_sec net_time proc_time | sort - proc_time
# (full multi-line search below)
#   | tstats `summariesonly` count min(_time) as proc_time values(Processes.process) as cmdline values(Processes.parent_process) as parent_cmdline from datamodel=Endpoint.Processes where Processes.parent_process_name IN ("httpd","httpd.exe","nginx","nginx.exe","apache2","apache.exe","java","java.exe","tomcat.exe","node","node.exe","w3wp.exe","php-fpm","php-fpm7","php-fpm8","sshd","xrdp","mifs","panos_pkt_srv","gunicorn","uwsgi","python","python.exe","python3","pythonw.exe","dotnet.exe","ruby","ruby.exe") AND Processes.process_name IN ("cmd.exe","powershell.exe","pwsh.exe","mshta.exe","rundll32.exe","regsvr32.exe","wscript.exe","cscript.exe","bitsadmin.exe","certutil.exe","curl.exe","wget.exe","whoami.exe","net.exe","systeminfo.exe","sh","bash","dash","zsh","ksh","curl","wget","whoami","id","uname","python","python3","perl") AND NOT Processes.user="*$" by Processes.dest Processes.user Processes.parent_process_name Processes.process_name | `drop_dm_object_name(Processes)` | rename dest as host | join type=inner host [ | tstats `summariesonly` min(_time) as net_time values(All_Traffic.src) as src_ip values(All_Traffic.dest_port) as dest_port from datamodel=Network_Traffic.All_Traffic where All_Traffic.action!="blocked" AND All_Traffic.action!="deny" AND All_Traffic.action!="drop" AND NOT (cidrmatch("10.0.0.0/8",All_Traffic.src) OR cidrmatch("172.16.0.0/12",All_Traffic.src) OR cidrmatch("192.168.0.0/16",All_Traffic.src) OR cidrmatch("127.0.0.0/8",All_Traffic.src) OR cidrmatch("169.254.0.0/16",All_Traffic.src) OR cidrmatch("100.64.0.0/10",All_Traffic.src)) by All_Traffic.dest | `drop_dm_object_name(All_Traffic)` | rename dest as host ] | eval delay_sec=proc_time-net_time | where delay_sec>=0 AND delay_sec<=600 | table host user parent_process_name process_name cmdline parent_cmdline src_ip dest_port delay_sec net_time proc_time | sort - proc_time
#
# --- Non-summarised variant (no CIM acceleration required) ---
# Replace the `search =` line above with the body below if your
# environment doesn't have CIM data-model acceleration enabled.
