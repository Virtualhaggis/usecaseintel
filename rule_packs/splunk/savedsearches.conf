[usecaseintel - [WEEKLY] Vendor / Third-Party OAuth App or SP Sign-in From Unbaselined Egress Followed by Bulk SaaS Object Read]
description = Chains two events on the same identity within a 30-minute window: (1) a successful OAuth-app, service-principal, or federated SSO sign-in from an (AppId,SrcIP) pair that has never been seen in the prior 30-day baseline; and (2) the same actor performing bulk reads (>=50 files / mail items / repository pulls / customer-record queries) immediately afterwards. This is the joint fingerprint of the ShinyHunters Vimeo ("Vimeo Data Breach Exposes 119,000 Users" and "Vimeo data breach exposes personal information of 119,000 people", May 2026) and Zara ("Zara data breach exposed personal information of 197,000 people", May 2026) intrusions, which abused vendor service principals (e.g. Anodot OAuth app) and named UNC6661/UNC6671 proxy IPs to pivot from federated identity to mass data theft; the RansomHouse Trellix source-code-repository compromise ("Trellix Confirms Source Code Breach...", "Trellix source code breach claimed by RansomHouse hackers", "Trellix Breach – RansomHouse Claims Access...", "Trellix discloses data breach...", May 2026) where attackers logged in to a third-party-managed code SaaS and pulled repo archives; the NVIDIA / GFN.AM regional-partner breach ("NVIDIA confirms GeForce NOW data breach affecting Armenian users", "NVIDIA Data Breach Reportedly Exposes Personal Information of GeForce Users", May 2026) where a partner-side admin account was used to read the user database; the DAEMON Tools supply-chain breach ("DAEMON Tools devs confirm breach", May 2026); and the PhantomCore TrueConf campaign ("PhantomCore Exploits TrueConf Vulnerabilities...", April 2026) which pivoted via SaaS valid-account abuse after exploit. Kill-chain stages spanned: initial access via T1199 trusted relationship, defense evasion via T1550.001 application-token reuse, and actions-on-objective via T1530 / T1213 bulk repository / cloud-object read. The rule fires only when BOTH stages are present on the same principal inside the correlation window; it will NOT fire on routine vendor sign-ins from their canonical egress, on ad-hoc downloads under the bulk threshold, or on first-party Microsoft / Google built-in apps (which are excluded from the SP scope).
search = ``` Stage 1 — successful SP / OAuth / federated sign-ins (last 14d) with their (app,src) pair ```
# (full multi-line search below)
#   ``` Stage 1 — successful SP / OAuth / federated sign-ins (last 14d) with their (app,src) pair ```
#   | tstats `summariesonly` earliest(_time) as auth_time, values(Authentication.src) as auth_src, values(Authentication.app) as auth_app, values(Authentication.signature_id) as auth_sig from datamodel=Authentication where Authentication.action=success AND Authentication.signature_id IN ("ServicePrincipalSignIn","NonInteractiveUserSignIn","UserLoggedIn","ConsoleLogin","AssumeRoleWithSAML","federatedSSO","user.session.start") AND earliest=-14d@d by Authentication.user span=1m
#   | `drop_dm_object_name(Authentication)`
#   | rename user as actor
#   ``` Anti-baseline: keep only (app,src) pairs never (or barely) seen in the prior 30d window ```
#   | join type=left auth_app, auth_src [ tstats `summariesonly` count as baseline_count from datamodel=Authentication where Authentication.action=success AND earliest=-30d@d latest=-14d@d by Authentication.app, Authentication.src | `drop_dm_object_name(Authentication)` | rename app as auth_app, src as auth_src ]
#   | fillnull baseline_count value=0
#   | where baseline_count <= 2
#   ``` Stage 2 — bulk SaaS object reads by the same actor within 30 minutes ```
#   | join type=inner actor max=0 [ tstats `summariesonly` count from datamodel=Change where All_Changes.action IN ("read","downloaded","accessed","exported","cloned") AND All_Changes.object_category IN ("file","email","repository","record","blob","secret","mailbox") by _time, All_Changes.user, All_Changes.object, All_Changes.app, All_Changes.object_category | `drop_dm_object_name(All_Changes)` | rename user as actor, _time as access_time, object as object_id, app as access_app, object_category as object_kind ]
#   | where access_time >= auth_time AND access_time <= auth_time + 1800
#   | stats count as ObjectsRead, dc(object_id) as DistinctObjects, values(object_kind) as ObjectKinds, values(access_app) as AccessApps, min(access_time) as FirstAccess, max(access_time) as LastAccess by actor, auth_app, auth_src, auth_time
#   | where ObjectsRead >= 50 OR DistinctObjects >= 25
#   | convert ctime(auth_time) ctime(FirstAccess) ctime(LastAccess)
#
# --- Non-summarised variant (no CIM acceleration required) ---
# Replace the `search =` line above with the body below if your
# environment doesn't have CIM data-model acceleration enabled.
#   ``` Stage 1 — successful SP / OAuth / federated sign-ins (last 14d) with their (app,src) pair ```
#   | tstats summariesonly=false earliest(_time) as auth_time, values(Authentication.src) as auth_src, values(Authentication.app) as auth_app, values(Authentication.signature_id) as auth_sig from datamodel=Authentication where Authentication.action=success AND Authentication.signature_id IN ("ServicePrincipalSignIn","NonInteractiveUserSignIn","UserLoggedIn","ConsoleLogin","AssumeRoleWithSAML","federatedSSO","user.session.start") AND earliest=-14d@d by Authentication.user span=1m
#   | `drop_dm_object_name(Authentication)`
#   | rename user as actor
#   ``` Anti-baseline: keep only (app,src) pairs never (or barely) seen in the prior 30d window ```
#   | join type=left auth_app, auth_src [ tstats summariesonly=false count as baseline_count from datamodel=Authentication where Authentication.action=success AND earliest=-30d@d latest=-14d@d by Authentication.app, Authentication.src | `drop_dm_object_name(Authentication)` | rename app as auth_app, src as auth_src ]
#   | fillnull baseline_count value=0
#   | where baseline_count <= 2
#   ``` Stage 2 — bulk SaaS object reads by the same actor within 30 minutes ```
#   | join type=inner actor max=0 [ tstats summariesonly=false count from datamodel=Change where All_Changes.action IN ("read","downloaded","accessed","exported","cloned") AND All_Changes.object_category IN ("file","email","repository","record","blob","secret","mailbox") by _time, All_Changes.user, All_Changes.object, All_Changes.app, All_Changes.object_category | `drop_dm_object_name(All_Changes)` | rename user as actor, _time as access_time, object as object_id, app as access_app, object_category as object_kind ]
