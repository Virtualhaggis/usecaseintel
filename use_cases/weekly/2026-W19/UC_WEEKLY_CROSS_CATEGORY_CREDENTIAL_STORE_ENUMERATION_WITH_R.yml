id: UC_WEEKLY_CROSS_CATEGORY_CREDENTIAL_STORE_ENUMERATION_WITH_R
title: "[WEEKLY] Cross-category credential-store enumeration with rapid egress to anonymizing tunnel/CDN"
kill_chain: actions
confidence: High
tier: alerting
fp_rate_estimate: low
implementations:
- defender
- sentinel
- splunk
- datadog
mitre_attack:
- id: T1555
  name: Credentials from Password Stores
- id: T1555.003
  name: Credentials from Web Browsers
- id: T1552.001
  name: "Unsecured Credentials: Credentials In Files"
- id: T1539
  name: Steal Web Session Cookie
- id: T1041
  name: Exfiltration Over C2 Channel
- id: T1572
  name: Protocol Tunneling
data_models:
  defender:
  - Endpoint.Filesystem
  - Endpoint.Processes
  - Network_Traffic.All_Traffic
description: |-
  Detects a single endpoint process that touches credential material from THREE or more distinct categories — browser logins/cookies, DevOps & cloud secrets (.aws, .kube, .npmrc, .pypirc, .docker, .git-credentials, .netrc), SSH private keys, DPAPI/Vault/Credential-Manager stores, password-manager vaults, or crypto-wallet directories — within a 5-minute window, AND the same host egresses to an anonymizing tunnel or CDN (bore.pub, *.trycloudflare.com, *.ngrok.io, *.workers.dev, *.web.app, pastebin/transfer.sh, Telegram API) within 10 minutes of the last credential read. This fortnight saw at least eight distinct intrusion lures converge on identical actions-on-objectives: PCPJack cloud-worm and TeamPCP-eviction (SentinelLabs, BleepingComputer 2026-05-07), PamDOORa PAM backdoor on Linux (THN/CSN 2026-05-08), QLNX Quasar Linux RAT (THN 2026-05-08), MuddyWater Teams-vishing false-flag ransomware (THN 2026-05-06), CloudZ RAT/Pheno plugin via Windows Phone Link (THN 2026-05-06), DEEP#DOOR Python backdoor exfilling over bore.pub (THN 2026-04-30), malicious NuGet packages (CSN 2026-05-07), Fake OpenClaw installer hitting 250+ extensions (CSN 2026-05-08), event-invitation phishing (CSN 2026-05-07), and the SAP-npm supply-chain compromise (BleepingComputer 2026-04-29) — all delivery paths differ but the collection+exfiltration stage is the same heterogeneous-secret fan-out followed by tunneled egress. Spans Collection (T1555/T1552/T1539) and Exfiltration (T1041/T1567/T1572) — the only two kill-chain stages every article shares. FIRES when one process_guid (or PID on the same host within 60s) reads ≥3 distinct credential CATEGORIES then the host egresses to a tunneling/CDN host or otherwise-rare public destination. DOES NOT FIRE on browsers reading only their own cookie/Login-Data store, native password managers reading their own vault, git/aws-cli/kubectl/npm reading a single category for legitimate use, or baselined backup/EDR/SCM agents.
  
  Rationale: Every one of the 12 articles converges on the same actions-on-objectives step regardless of the unique delivery vector — enumerate every credential store the user has and exfiltrate them, often via an anonymizing tunnel (bore.pub in DEEP#DOOR, *.cloudfront-js.com in PCPJack, *.njalla in NuGet packages, Telegram/transfer.sh elsewhere). Catching the rare combination 'one process touches ≥3 credential-store CATEGORIES inside 5 min, then the host beacons to a tunneling/CDN host within 10 min' is invariant to which CVE was exploited, which lure was used, or which IOC rotates next week, while remaining structurally rare in legitimate use (browsers, password managers, and dev CLIs each stay inside a single category).
defender_kql: |-
  let LookbackHours = 24h;
  let FanoutWindow = 5m;
  let EgressWindow = 10m;
  let _tunnel_domains = dynamic(["bore.pub","trycloudflare.com","ngrok.io","ngrok-free.app","workers.dev","web.app","pages.dev","transfer.sh","pastebin.com","api.telegram.org","serveo.net","localtunnel.me","loca.lt","cloudfront-js.com"]);
  let _allow_procs = dynamic(["chrome.exe","msedge.exe","firefox.exe","keepass.exe","1password.exe","bitwarden.exe","git.exe","aws.exe","kubectl.exe","docker.exe","MsMpEng.exe","OneDrive.exe","explorer.exe"]);
  let CredReads = DeviceFileEvents
  | where Timestamp > ago(LookbackHours)
  | where ActionType in ("FileCreated","FileModified","FileRenamed","FileOpened")
  | where InitiatingProcessFileName !in~ (_allow_procs)
  | where InitiatingProcessAccountName !endswith "$"
  | extend FullPath = strcat(FolderPath, "\\", FileName)
  | extend cred_cat = case(
      FullPath matches regex @"(?i)(Login Data|Cookies|logins\.json|key4\.db|Web Data)", "browser",
      FullPath matches regex @"(?i)(\\\.aws\\credentials|\\\.kube\\config|\\\.npmrc|\\\.pypirc|\\\.git-credentials|\\\.docker\\config|\\\.netrc|\\\.azure\\|gcloud\\|\\\.vault-token)", "devops",
      FullPath matches regex @"(?i)\\\.ssh\\(id_|known_hosts)", "ssh",
      FullPath matches regex @"(?i)Microsoft\\(Protect|Credentials|Vault|Crypto)\\", "dpapi",
      FullPath matches regex @"(?i)(Ethereum|Exodus|Electrum|Atomic|MetaMask|nkbihfbeogaeaoehlefnkodbefgpgknn|keystore)", "wallet",
      FullPath matches regex @"(?i)(KeePass|1Password|Bitwarden|\.kdbx|\.opvault)", "passmgr",
      "")
  | where isnotempty(cred_cat)
  | summarize FanoutFirst = min(Timestamp), FanoutLast = max(Timestamp),
              CategoryCount = dcount(cred_cat),
              Categories = make_set(cred_cat),
              FilesTouched = make_set(FullPath, 100)
              by DeviceId, DeviceName, InitiatingProcessId, InitiatingProcessFileName,
                 InitiatingProcessAccountName, bin(Timestamp, FanoutWindow)
  | where CategoryCount >= 3;
  let Egress = DeviceNetworkEvents
  | where Timestamp > ago(LookbackHours)
  | where ActionType in ("ConnectionSuccess","HttpConnectionInspected","ConnectionRequest")
  | where RemoteIPType == "Public"
  | where RemoteUrl has_any (_tunnel_domains)
       or RemoteUrl has_any (dynamic(["<c2_domain_list>"]))
  | project EgressTime = Timestamp, DeviceId, DeviceName,
            EgressProcess = InitiatingProcessFileName,
            RemoteUrl, RemoteIP, RemotePort;
  CredReads
  | join kind=inner Egress on DeviceId
  | where EgressTime between (FanoutFirst .. FanoutLast + EgressWindow)
  | extend DelaySec = datetime_diff('second', EgressTime, FanoutLast)
  | project FanoutFirst, FanoutLast, DeviceName,
            User = InitiatingProcessAccountName,
            FanoutProcess = InitiatingProcessFileName,
            FanoutPid = InitiatingProcessId,
            CategoryCount, Categories, FilesTouched,
            EgressTime, EgressProcess, RemoteUrl, RemoteIP, RemotePort, DelaySec
  | order by FanoutFirst desc
sentinel_kql: |-
  let LookbackHours = 24h;
  let FanoutWindow = 5m;
  let EgressWindow = 10m;
  let _tunnel_domains = dynamic(["bore.pub","trycloudflare.com","ngrok.io","ngrok-free.app","workers.dev","web.app","pages.dev","transfer.sh","pastebin.com","api.telegram.org","serveo.net","localtunnel.me","loca.lt","cloudfront-js.com"]);
  let _allow_procs = dynamic(["chrome.exe","msedge.exe","firefox.exe","keepass.exe","1password.exe","bitwarden.exe","git","git.exe","aws","aws.exe","kubectl","kubectl.exe","docker","docker.exe","MsMpEng.exe","OneDrive.exe","explorer.exe"]);
  let CredReads = ImFileEvent
  | where TimeGenerated > ago(LookbackHours)
  | where EventType in ("FileCreated","FileModified","FileAccessed","FileRenamed")
  | where ActingProcessName !in~ (_allow_procs)
  | where ActorUsername !endswith "$"
  | extend cred_cat = case(
      TargetFilePath matches regex @"(?i)(Login Data|Cookies|logins\.json|key4\.db|Web Data)", "browser",
      TargetFilePath matches regex @"(?i)(\.aws[\\/]credentials|\.kube[\\/]config|\.npmrc|\.pypirc|\.git-credentials|\.docker[\\/]config|\.netrc|\.azure[\\/]|gcloud[\\/]|\.vault-token)", "devops",
      TargetFilePath matches regex @"(?i)\.ssh[\\/](id_|known_hosts)", "ssh",
      TargetFilePath matches regex @"(?i)Microsoft[\\/](Protect|Credentials|Vault|Crypto)[\\/]", "dpapi",
      TargetFilePath matches regex @"(?i)(Ethereum|Exodus|Electrum|Atomic|MetaMask|nkbihfbeogaeaoehlefnkodbefgpgknn|keystore)", "wallet",
      TargetFilePath matches regex @"(?i)(KeePass|1Password|Bitwarden|\.kdbx|\.opvault|password-store)", "passmgr",
      "")
  | where isnotempty(cred_cat)
  | summarize FanoutFirst = min(TimeGenerated), FanoutLast = max(TimeGenerated),
              CategoryCount = dcount(cred_cat),
              Categories = make_set(cred_cat),
              FilesTouched = make_set(TargetFilePath, 100)
              by DvcHostname, ActingProcessId, ActingProcessName, ActorUsername,
                 bin(TimeGenerated, FanoutWindow)
  | where CategoryCount >= 3;
  let Egress = ImNetworkSession
  | where TimeGenerated > ago(LookbackHours)
  | where DvcAction != "Deny"
  | where isnotempty(DstIpAddr) and not(ipv4_is_private(DstIpAddr))
  | where Url has_any (_tunnel_domains) or DstHostname has_any (_tunnel_domains)
       or Url has_any (dynamic(["<c2_domain_list>"]))
  | project EgressTime = TimeGenerated, DvcHostname,
            EgressProcess = ActingProcessName,
            Url, DstHostname, DstIpAddr, DstPortNumber;
  CredReads
  | join kind=inner Egress on DvcHostname
  | where EgressTime between (FanoutFirst .. FanoutLast + EgressWindow)
  | extend DelaySec = datetime_diff('second', EgressTime, FanoutLast)
  | project FanoutFirst, FanoutLast, DvcHostname, ActorUsername,
            FanoutProcess = ActingProcessName, FanoutPid = ActingProcessId,
            CategoryCount, Categories, FilesTouched,
            EgressTime, EgressProcess, Url, DstHostname, DstIpAddr, DstPortNumber, DelaySec
  | order by FanoutFirst desc
splunk_spl: |-
  | tstats `summariesonly` count min(_time) as firstTime max(_time) as lastTime values(Filesystem.file_path) as touched_paths from datamodel=Endpoint.Filesystem where Filesystem.action IN ("read","opened","accessed","queried") AND (Filesystem.file_path IN ("*\\AppData\\*\\Login Data*","*\\AppData\\*\\Cookies*","*\\AppData\\*\\Web Data*","*\\Mozilla\\Firefox\\Profiles\\*\\logins.json","*\\Mozilla\\Firefox\\Profiles\\*\\key4.db","*\\AppData\\*\\Edge\\*\\Login Data*") OR Filesystem.file_path IN ("*\\.aws\\credentials","*\\.kube\\config","*\\.npmrc","*\\.pypirc","*\\.git-credentials","*\\.docker\\config.json","*\\.netrc","*\\.azure\\*","*\\gcloud\\credentials*","*\\.vault-token","/home/*/.aws/credentials","/root/.aws/credentials","/home/*/.kube/config","/home/*/.npmrc","/home/*/.pypirc","/home/*/.git-credentials","/home/*/.docker/config.json","/home/*/.netrc") OR Filesystem.file_path IN ("/home/*/.ssh/id_*","/root/.ssh/id_*","/home/*/.ssh/known_hosts","*\\.ssh\\id_*","*\\.ssh\\known_hosts") OR Filesystem.file_path IN ("*\\AppData\\Roaming\\Microsoft\\Protect\\*","*\\AppData\\Local\\Microsoft\\Credentials\\*","*\\AppData\\Roaming\\Microsoft\\Vault\\*","*\\AppData\\Roaming\\Microsoft\\Crypto\\*") OR Filesystem.file_path IN ("*\\AppData\\Roaming\\Ethereum\\keystore\\*","*\\AppData\\Roaming\\Exodus\\*","*\\AppData\\Roaming\\Electrum\\wallets\\*","*\\AppData\\Local\\Google\\Chrome\\*\\Local Extension Settings\\nkbihfbeogaeaoehlefnkodbefgpgknn\\*","*\\AppData\\Local\\Google\\Chrome\\*\\Local Extension Settings\\*\\*.ldb","*\\AppData\\Roaming\\Atomic\\Local Storage\\*","/home/*/.ethereum/keystore/*") OR Filesystem.file_path IN ("*\\KeePass\\*.kdbx","*\\1Password\\*\\*.opvault","*\\Bitwarden\\data.json","*\\AppData\\Roaming\\KeePass\\*","/home/*/.password-store/*")) by Filesystem.dest Filesystem.process_guid Filesystem.process_name Filesystem.user _time span=5m | eval cred_cat=case(match(touched_paths,"(?i)(Login Data|Cookies|logins\\.json|key4\\.db|Web Data)"),"browser",match(touched_paths,"(?i)(\\.aws[\\\\/]credentials|\\.kube[\\\\/]config|\\.npmrc|\\.pypirc|\\.git-credentials|\\.docker[\\\\/]config|\\.netrc|\\.azure|gcloud|\\.vault-token)"),"devops",match(touched_paths,"(?i)(\\.ssh[\\\\/](id_|known_hosts))"),"ssh",match(touched_paths,"(?i)Microsoft\\\\(Protect|Credentials|Vault|Crypto)"),"dpapi",match(touched_paths,"(?i)(Ethereum|Exodus|Electrum|Atomic|MetaMask|nkbihfbeogae|keystore)"),"wallet",match(touched_paths,"(?i)(KeePass|1Password|Bitwarden|password-store|opvault|kdbx)"),"passmgr",1=1,"other") | stats min(firstTime) as fanout_first max(lastTime) as fanout_last dc(cred_cat) as category_count values(cred_cat) as categories values(touched_paths) as files by dest process_guid process_name user | where category_count>=3 AND NOT process_name IN ("chrome.exe","msedge.exe","firefox.exe","keepass.exe","1password.exe","bitwarden.exe","git.exe","aws.exe","kubectl.exe","docker.exe","backup-agent","MsMpEng.exe") | join type=inner dest [ | tstats `summariesonly` min(_time) as egress_first max(_time) as egress_last values(All_Traffic.dest) as egress_dest values(All_Traffic.dest_port) as egress_port from datamodel=Network_Traffic.All_Traffic where All_Traffic.action="allowed" AND All_Traffic.dest_category!="internal" AND (All_Traffic.dest IN ("*.bore.pub","bore.pub","*.trycloudflare.com","*.ngrok.io","*.ngrok-free.app","*.workers.dev","*.web.app","*.pages.dev","transfer.sh","pastebin.com","*.pastebin.com","api.telegram.org","*.serveo.net","*.localtunnel.me","*.loca.lt","*.cloudfront-js.com") OR All_Traffic.dest IN ("<c2_domain_list>")) by All_Traffic.src ] | rename src as dest | where egress_first >= fanout_first AND egress_first <= (fanout_last + 600) | eval delay_sec=egress_first-fanout_last | `drop_dm_object_name(Filesystem)` | table fanout_first fanout_last dest user process_name process_guid category_count categories egress_first egress_dest egress_port delay_sec files | sort -fanout_first
datadog_query: |-
  (source:(windows.sysmon OR linux.auditd) AND ((@EventID:11 AND (@TargetFilename:(*\\Login\ Data* OR *\\Cookies* OR *\\logins.json OR *\\key4.db OR *\\.aws\\credentials OR *\\.kube\\config OR *\\.npmrc OR *\\.pypirc OR *\\.git-credentials OR *\\.docker\\config.json OR *\\.ssh\\id_* OR *\\Microsoft\\Protect\\* OR *\\Microsoft\\Credentials\\* OR *\\Microsoft\\Vault\\* OR *\\Ethereum\\keystore\\* OR *\\Exodus\\* OR *\\nkbihfbeogaeaoehlefnkodbefgpgknn\\* OR *\\KeePass\\* OR *\\Bitwarden\\* OR *.kdbx)) OR (@auditd.type:(PATH OR SYSCALL) AND @file.path:(*/.aws/credentials OR */.kube/config OR */.npmrc OR */.pypirc OR */.git-credentials OR */.docker/config.json OR */.ssh/id_* OR */.ssh/known_hosts OR */.netrc OR */.vault-token OR */.ethereum/keystore/* OR */.password-store/*)))) -@Image:(*\\chrome.exe OR *\\msedge.exe OR *\\firefox.exe OR *\\keepass.exe OR *\\1password.exe OR *\\bitwarden.exe OR *\\git.exe OR *\\aws.exe OR *\\kubectl.exe OR *\\docker.exe OR *\\MsMpEng.exe) -@process.name:(chrome OR firefox OR git OR aws OR kubectl OR docker OR keepassxc OR gnome-keyring* OR snapd OR pamac*)
