id: UC_WEEKLY_NON_BROWSER_PROCESS_READS_BROWSER_CREDENTIAL_COOKI
title: "[WEEKLY] Non-Browser Process Reads Browser Credential / Cookie SQLite Then Egresses to Public Destination Within 10 Minutes"
kill_chain: actions
confidence: High
tier: alerting
fp_rate_estimate: medium
implementations:
- defender
- sentinel
- splunk
- datadog
mitre_attack:
- id: T1555.003
  name: "Credentials from Password Stores: Credentials from Web Browsers"
- id: T1539
  name: Steal Web Session Cookie
- id: T1005
  name: Data from Local System
- id: T1041
  name: Exfiltration Over C2 Channel
- id: T1567
  name: Exfiltration Over Web Service
- id: T1071.001
  name: "Application Layer Protocol: Web Protocols"
data_models:
  defender:
  - Endpoint.Filesystem
  - Endpoint.Processes
  - Network_Traffic.All_Traffic
description: |-
  Detects the joint actions-on-objectives pattern shared across this fortnight's 12 intrusion reports: a process that is NOT a known web-browser binary opens one of the Chromium / Edge / Gecko credential or cookie stores (Login Data, Cookies, Web Data, Local State, logins.json, key4.db) and, within 10 minutes, the same PID initiates an outbound TCP/HTTP/HTTPS connection to a public IP. This fortnight the pattern is driven by the fake-OpenClaw infostealer that hunts 250+ browser/wallet extensions, the DEEP#DOOR Python backdoor exfiltrating browser & cloud creds via bore.pub tunneling, the TeamPCP / Mini Shai-Hulud supply-chain compromises of @cap-js SAP packages and PyTorch-Lightning v2.6.2/2.6.3 that drop Bun runtimes to grab tokens, CloudZ RAT + Pheno staging at C:\ProgramData\Microsoft\whealth\ to siphon Phone Link OTPs, MuddyWater's Stagecomp/Darkcomp Teams-delivered loaders, UAT-8302's wagent.exe collector against government browsers, the event-invitation phishing kits, and PamDOORa's post-PAM-hijack browser fan-out on Linux. Kill-chain stages spanned: Collection (T1555.003 / T1539 / T1005) → Exfiltration (T1041 / T1567 / T1071.001). It WILL fire on stealers, RAT collectors and supply-chain payloads that read those files from python.exe / node.exe / bun.exe / pwsh.exe / custom .exes; it will NOT fire on the browser process itself, on baselined EDR / AV / backup readers (allowlisted), on credential reads with no egress (those surface as a hunting drop-rule), or on egress without a prior credential read.
  
  Rationale: All 12 articles describe different delivery (Bun supply-chain in SAP & PyTorch-Lightning, fake OpenClaw installer, MuddyWater Teams social-engineering, ClickFix, Phone Link plugin, Linux PAM hijack, event-invitation phishing, fake Android apps, government-targeted UAT-8302 custom loader) and persistence (Scheduled Task, Run keys, PAM module, WMI subscription) but converge on the same impact behaviour: a NON-browser process opening Chromium/Edge/Gecko credential SQLite files and exfiltrating shortly after. Correlating same-PID FileEvent → NetworkEvent inside 10 minutes catches the joint TTP regardless of which loader/family delivered the stealer this week.
defender_kql: |-
  let LookbackHours = 24h;
  let WindowMin = 10m;
  let BrowserBins = dynamic(["chrome.exe","msedge.exe","firefox.exe","brave.exe","opera.exe","vivaldi.exe","arc.exe","msedgewebview2.exe","iexplore.exe"]);
  let SystemBins = dynamic(["MsMpEng.exe","MpCmdRun.exe","NisSrv.exe","TrustedInstaller.exe","SearchProtocolHost.exe","SenseIR.exe","MsSense.exe","SenseNdr.exe","CSFalconService.exe","explorer.exe"]);
  let CredFileNames = dynamic(["Login Data","Login Data For Account","Cookies","Web Data","Local State","logins.json","key3.db","key4.db","cert8.db","cert9.db","signons.sqlite"]);
  let CredFolderTokens = dynamic([@"\Google\Chrome\User Data\",@"\Microsoft\Edge\User Data\",@"\Mozilla\Firefox\Profiles\",@"\BraveSoftware\Brave-Browser\User Data\",@"\Opera Software\Opera Stable\",@"\Vivaldi\User Data\",@"/.config/google-chrome/",@"/.config/chromium/",@"/.mozilla/firefox/"]);
  let CredReads = DeviceFileEvents
      | where Timestamp > ago(LookbackHours)
      | where ActionType in ("FileCreated","FileModified","FileRenamed")
          or isnotempty(InitiatingProcessId)
      | where FileName in~ (CredFileNames) or FolderPath has_any (CredFolderTokens)
      | where InitiatingProcessFileName !in~ (BrowserBins)
      | where InitiatingProcessFileName !in~ (SystemBins)
      | where isnotempty(InitiatingProcessAccountName)
      | where InitiatingProcessAccountName !endswith "$"
      | project FileTime = Timestamp, DeviceId, DeviceName,
                InitiatingProcessId, InitiatingProcessFileName, InitiatingProcessFolderPath,
                InitiatingProcessSHA256, InitiatingProcessCommandLine, InitiatingProcessAccountName,
                CredFile = FolderPath, CredName = FileName;
  let NetEgress = DeviceNetworkEvents
      | where Timestamp > ago(LookbackHours)
      | where RemoteIPType == "Public"
      | where ActionType in ("ConnectionSuccess","ConnectionAttempt","HttpConnectionInspected")
      | project NetTime = Timestamp, DeviceId, InitiatingProcessId,
                InitiatingProcessFileName, RemoteIP, RemoteUrl, RemotePort;
  CredReads
  | join kind=inner NetEgress on DeviceId, InitiatingProcessId, InitiatingProcessFileName
  | where NetTime between (FileTime .. FileTime + WindowMin)
  | summarize FirstFile = min(FileTime),
              FirstNet  = min(NetTime),
              DelaySec  = min(datetime_diff('second', NetTime, FileTime)),
              CredFiles = make_set(strcat(CredFile, CredName), 25),
              RemoteIPs = make_set(RemoteIP, 25),
              RemoteUrls = make_set(RemoteUrl, 25),
              RemotePorts = make_set(RemotePort, 25),
              EgressCount = count()
              by DeviceName, InitiatingProcessAccountName, InitiatingProcessFileName,
                 InitiatingProcessFolderPath, InitiatingProcessSHA256, InitiatingProcessCommandLine
  | where DelaySec >= 0 and DelaySec <= 600
  | order by FirstFile desc
sentinel_kql: |-
  let LookbackHours = 24h;
  let WindowMin = 10m;
  let BrowserBins = dynamic(["chrome.exe","msedge.exe","firefox.exe","brave.exe","opera.exe","vivaldi.exe","arc.exe","msedgewebview2.exe","iexplore.exe","chrome","firefox"]);
  let SystemBins = dynamic(["MsMpEng.exe","MpCmdRun.exe","TrustedInstaller.exe","SearchProtocolHost.exe","SenseIR.exe","MsSense.exe","CSFalconService.exe","explorer.exe"]);
  let CredFileNames = dynamic(["Login Data","Login Data For Account","Cookies","Web Data","Local State","logins.json","key3.db","key4.db","cert9.db","signons.sqlite"]);
  let CredFolderTokens = dynamic([@"\Google\Chrome\User Data\",@"\Microsoft\Edge\User Data\",@"\Mozilla\Firefox\Profiles\",@"\BraveSoftware\Brave-Browser\User Data\",@"/.config/google-chrome/",@"/.mozilla/firefox/"]);
  let CredReads = ImFileEvent
      | where TimeGenerated > ago(LookbackHours)
      | where EventType in ("FileCreated","FileModified","FileRenamed","FileAccessed")
          or isnotempty(ActingProcessId)
      | where TargetFileName in~ (CredFileNames) or TargetFilePath has_any (CredFolderTokens)
      | where ActingProcessName !in~ (BrowserBins)
      | where ActingProcessName !in~ (SystemBins)
      | where isnotempty(ActorUsername)
      | where ActorUsername !endswith "$"
      | project FileTime = TimeGenerated, DvcHostname,
                ActingProcessId, ActingProcessName, ActingProcessCommandLine,
                ActorUsername, TargetFilePath, TargetFileName;
  let NetEgress = ImNetworkSession
      | where TimeGenerated > ago(LookbackHours)
      | where isnotempty(DstIpAddr)
      | where ipv4_is_private(DstIpAddr) == false
      | where not(DstIpAddr startswith "127.") and not(DstIpAddr startswith "169.254.")
      | project NetTime = TimeGenerated, DvcHostname, ActingProcessId, ActingProcessName,
                DstIpAddr, DstPortNumber, Url;
  CredReads
  | join kind=inner NetEgress on DvcHostname, ActingProcessId, ActingProcessName
  | where NetTime between (FileTime .. FileTime + WindowMin)
  | summarize FirstFile = min(FileTime),
              FirstNet  = min(NetTime),
              DelaySec  = min(datetime_diff('second', NetTime, FileTime)),
              CredFiles = make_set(strcat(TargetFilePath,"\\",TargetFileName), 25),
              DstIPs    = make_set(DstIpAddr, 25),
              Urls      = make_set(Url, 25),
              Ports     = make_set(DstPortNumber, 25)
              by DvcHostname, ActorUsername, ActingProcessName, ActingProcessCommandLine
  | where DelaySec between (0 .. 600)
  | order by FirstFile desc
splunk_spl: |-
  | tstats summariesonly=t count min(_time) as firstFile values(Filesystem.file_path) as cred_files from datamodel=Endpoint.Filesystem where (Filesystem.file_name IN ("Login Data","Login Data For Account","Cookies","Web Data","Local State","logins.json","key3.db","key4.db","cert8.db","cert9.db","signons.sqlite") OR Filesystem.file_path IN ("*\\Google\\Chrome\\User Data\\*\\Login Data*","*\\Google\\Chrome\\User Data\\*\\Cookies*","*\\Google\\Chrome\\User Data\\*\\Web Data*","*\\Microsoft\\Edge\\User Data\\*\\Login Data*","*\\Microsoft\\Edge\\User Data\\*\\Cookies*","*\\BraveSoftware\\Brave-Browser\\User Data\\*\\Login Data*","*\\Mozilla\\Firefox\\Profiles\\*\\logins.json","*\\Mozilla\\Firefox\\Profiles\\*\\key4.db","/home/*/.config/google-chrome/*/Login Data","/home/*/.config/google-chrome/*/Cookies","/home/*/.mozilla/firefox/*/logins.json","/home/*/.mozilla/firefox/*/key4.db","/Users/*/Library/Application Support/Google/Chrome/*/Login Data","/Users/*/Library/Application Support/Firefox/Profiles/*/logins.json")) AND NOT Filesystem.process_name IN ("chrome.exe","msedge.exe","firefox.exe","brave.exe","opera.exe","vivaldi.exe","arc.exe","msedgewebview2.exe","iexplore.exe","chrome","firefox","MsMpEng.exe","MpCmdRun.exe","NisSrv.exe","TrustedInstaller.exe","SearchProtocolHost.exe","SenseIR.exe","MsSense.exe","SenseNdr.exe","CSFalconService.exe","CarbonBlack.exe","explorer.exe") AND NOT match(Filesystem.user, "(?i).*\\$$") by host Filesystem.process_guid Filesystem.process_name Filesystem.process_path Filesystem.user Filesystem.file_path Filesystem.file_name | `drop_dm_object_name(Filesystem)` | rename process_guid as src_guid | join type=inner host src_guid [ | tstats summariesonly=t count as net_count values(All_Traffic.dest_ip) as dst_ips values(All_Traffic.dest) as dst values(All_Traffic.dest_port) as ports min(_time) as firstNet from datamodel=Network_Traffic.All_Traffic where All_Traffic.dest_category!="internal" AND All_Traffic.action!="blocked" by host All_Traffic.process_guid | `drop_dm_object_name(All_Traffic)` | rename process_guid as src_guid ] | eval delaySec = firstNet - firstFile | where delaySec >= 0 AND delaySec <= 600 | table host user process_name process_path file_path file_name cred_files dst_ips dst ports firstFile firstNet delaySec | `security_content_ctime(firstFile)` | `security_content_ctime(firstNet)`
datadog_query: |-
  source:(windows.sysmon OR linux.auditd) (@EventID:11 OR @EventID:1 OR @auditd.type:PATH OR @auditd.type:EXECVE) (@TargetFilename:(*\\Google\\Chrome\\User\ Data\\*\\Login\ Data* OR *\\Google\\Chrome\\User\ Data\\*\\Cookies* OR *\\Google\\Chrome\\User\ Data\\*\\Web\ Data* OR *\\Google\\Chrome\\User\ Data\\Local\ State* OR *\\Microsoft\\Edge\\User\ Data\\*\\Login\ Data* OR *\\Microsoft\\Edge\\User\ Data\\*\\Cookies* OR *\\BraveSoftware\\Brave-Browser\\User\ Data\\*\\Login\ Data* OR *\\Mozilla\\Firefox\\Profiles\\*\\logins.json OR *\\Mozilla\\Firefox\\Profiles\\*\\key4.db) OR @file.path:(*/.config/google-chrome/*/Login\ Data OR */.config/google-chrome/*/Cookies OR */.mozilla/firefox/*/logins.json OR */.mozilla/firefox/*/key4.db OR */Library/Application\ Support/Google/Chrome/*/Login\ Data)) -@Image:(*\\chrome.exe OR *\\Chrome.exe OR *\\CHROME.EXE OR *\\msedge.exe OR *\\MsEdge.exe OR *\\firefox.exe OR *\\Firefox.exe OR *\\brave.exe OR *\\Brave.exe OR *\\opera.exe OR *\\vivaldi.exe OR *\\msedgewebview2.exe OR *\\MsMpEng.exe OR *\\MpCmdRun.exe OR *\\TrustedInstaller.exe OR *\\SenseIR.exe OR *\\MsSense.exe OR *\\CSFalconService.exe OR *\\explorer.exe) -@process.executable.path:(/opt/google/chrome/* OR /usr/lib/firefox/* OR /usr/bin/chrome OR /usr/bin/firefox OR /Applications/Google\ Chrome.app/*)
