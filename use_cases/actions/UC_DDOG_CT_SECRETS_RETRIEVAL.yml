id: UC_DDOG_CT_SECRETS_RETRIEVAL
title: AWS Secrets Manager retrieval by unfamiliar principal
kill_chain: actions
confidence: High
tier: alerting
fp_rate_estimate: low
implementations:
- datadog
mitre_attack:
- id: T1555
  name: Credentials from Password Stores
description: |-
  Secret read by a human / non-automation principal — credential-theft indicator. Datadog default 'CloudTrail Secrets Manager Retrieval'.
datadog_query: |-
  source:cloudtrail @evt.outcome:success @evt.name:GetSecretValue
  -@userIdentity.arn:(*ci-* OR *automation* OR *terraform-*)
