id: UC_DDOG_K8S_SECRET_ACCESSED
title: Kubernetes Secret accessed
kill_chain: actions
confidence: High
tier: alerting
fp_rate_estimate: low
implementations:
- datadog
mitre_attack:
- id: T1552.007
  name: Container API
- id: T1555
  name: Credentials from Password Stores
description: |-
  Secret read by a non-system principal — credential-theft signal. Datadog default 'Kubernetes secret accessed'.
datadog_query: |-
  source:kubernetes.audit @verb:get @objectRef.resource:secrets
  -@user.username:(system:serviceaccount:* OR system:apiserver)
