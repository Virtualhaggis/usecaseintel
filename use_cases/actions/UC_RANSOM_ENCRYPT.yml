id: UC_RANSOM_ENCRYPT
title: Ransomware-style mass file rename / extension change
kill_chain: actions
confidence: Medium
description: 'Threshold detection: many files renamed in short window, often with
  new extension.'
implementations:
- splunk
- defender
- sentinel
mitre_attack:
- id: T1486
  name: Data Encrypted for Impact
data_models:
  splunk:
  - Endpoint.Filesystem
  defender:
  - DeviceFileEvents
  sentinel:
  - ImFileEvent
splunk_spl: "| tstats `summariesonly` count, dc(Filesystem.file_name) AS files\n \
  \   from datamodel=Endpoint.Filesystem\n    where Filesystem.action IN (\"modified\"\
  ,\"renamed\")\n    by Filesystem.dest, Filesystem.user, _time span=1m\n| `drop_dm_object_name(Filesystem)`\n\
  | where files > 200\n| sort - files"
defender_kql: "DeviceFileEvents\n| where Timestamp > ago(1d)\n| where InitiatingProcessAccountName\
  \ !endswith \"$\"\n| where ActionType in (\"FileRenamed\",\"FileModified\")\n| summarize\
  \ files = dcount(FileName) by DeviceName, InitiatingProcessAccountName, bin(Timestamp,\
  \ 1m)\n| where files > 200    // empirical: > 200 unique-file renames in 1m by one\
  \ account on one host\n                       //            is well above the P99\
  \ of legitimate bulk-tooling\n| order by files desc\n"
tier: alerting
fp_rate_estimate: low
required_telemetry:
- Sysmon EID 11
- Defender DeviceFileEvents
sentinel_kql: "ImFileEvent\n| where TimeGenerated > ago(1d)\n| where ActorUsername\
  \ !endswith \"$\"\n| where EventType in (\"FileRenamed\",\"FileModified\")\n| summarize\
  \ files = dcount(TargetFileName)\n            by DvcHostname, ActorUsername, ActingProcessName,\
  \ bin(TimeGenerated, 1m)\n| where files > 200    // P99 of legit bulk-tooling per-minute\
  \ rename volume\n| order by files desc\n"
