id: UC_LATERAL_PSEXEC
title: Remote service execution — PsExec / SMB lateral movement
kill_chain: actions
confidence: High
description: psexec / paexec / smbexec / wmic /node — service install over SMB from remote host.
implementations:
- splunk
- defender
mitre_attack:
- id: T1021.002
  name: SMB/Windows Admin Shares
- id: T1569.002
  name: Service Execution
data_models:
  splunk:
  - Endpoint.Processes
  defender:
  - DeviceProcessEvents
splunk_spl: "| tstats `summariesonly` count min(_time) as firstTime max(_time) as lastTime\n    from datamodel=Endpoint.Processes\n    where Processes.process_name IN (\"psexec.exe\",\"psexesvc.exe\",\"paexec.exe\",\"smbexec.py\")\n       OR (Processes.process_name=\"wmic.exe\" AND Processes.process=\"*/node:*\")\n    by Processes.dest, Processes.user, Processes.process_name, Processes.process, Processes.parent_process_name\n| `drop_dm_object_name(Processes)`"
defender_kql: |
  DeviceProcessEvents
  | where Timestamp > ago(7d)
  | where AccountName !endswith "$"
  | where FileName in~ ("psexec.exe","psexesvc.exe","paexec.exe","smbexec.py")
     or (FileName =~ "wmic.exe" and ProcessCommandLine has "/node:")
  | project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine, InitiatingProcessFileName
  | order by Timestamp desc
tier: alerting
fp_rate_estimate: low
required_telemetry:
- Sysmon EID 1
- Defender DeviceProcessEvents
- Windows Event ID 7045 (service install)
