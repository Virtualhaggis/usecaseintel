id: UC_DDOG_AWS_CLOUDTRAIL_CONFIG_MODIFIED
title: AWS CloudTrail logging configuration modified
kill_chain: install
confidence: High
tier: alerting
fp_rate_estimate: low
implementations:
- datadog
mitre_attack:
- id: T1562.008
  name: Disable or Modify Cloud Logs
- id: T1098
  name: Account Manipulation
description: |-
  CloudTrail logging stopped, trail deleted, or selectors changed — blinding the audit pipeline. Datadog default 'AWS CloudTrail configuration modified'.
datadog_query: |-
  source:cloudtrail @evt.outcome:success
  @evt.name:(StopLogging OR DeleteTrail OR UpdateTrail OR PutEventSelectors)
