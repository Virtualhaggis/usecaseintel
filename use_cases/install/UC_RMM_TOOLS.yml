id: UC_RMM_TOOLS
title: RMM tool installed by non-IT user — remote-access utility for hands-on-keyboard
kill_chain: install
confidence: High
description: ConnectWise / AnyDesk / TeamViewer / ScreenConnect / Atera installed
  outside IT change windows = common tradecraft for ransomware affiliates and IT-helpdesk
  impersonators.
implementations:
- splunk
- defender
- sentinel
mitre_attack:
- id: T1219
  name: Remote Access Software
data_models:
  splunk:
  - Endpoint.Processes
  defender:
  - DeviceProcessEvents
  sentinel:
  - SecurityEvent
splunk_spl: "| tstats `summariesonly` count min(_time) as firstTime max(_time) as\
  \ lastTime\n    from datamodel=Endpoint.Processes\n    where Processes.process_name\
  \ IN (\"AnyDesk.exe\",\"TeamViewer.exe\",\"TeamViewer_Service.exe\",\n        \"\
  ScreenConnect.ClientService.exe\",\"ConnectWiseControl.ClientService.exe\",\n  \
  \      \"atera_agent.exe\",\"SplashtopStreamer.exe\",\"RustDesk.exe\",\"NinjaOne.exe\"\
  ,\"kaseya*.exe\")\n    by Processes.dest, Processes.user, Processes.process_name,\
  \ Processes.process, Processes.parent_process_name\n| `drop_dm_object_name(Processes)`"
defender_kql: "DeviceProcessEvents\n| where Timestamp > ago(7d)\n| where AccountName\
  \ !endswith \"$\"\n| where FileName in~ (\"AnyDesk.exe\",\"TeamViewer.exe\",\"TeamViewer_Service.exe\"\
  ,\n        \"ScreenConnect.ClientService.exe\",\"ConnectWiseControl.ClientService.exe\"\
  ,\n        \"atera_agent.exe\",\"SplashtopStreamer.exe\",\"RustDesk.exe\",\"NinjaOne.exe\"\
  )\n   or FileName matches regex @\"(?i)kaseya.*\\.exe\"\n| project Timestamp, DeviceName,\
  \ AccountName, FileName, ProcessCommandLine"
tier: hunting
fp_rate_estimate: high
required_telemetry:
- Sysmon EID 1
- Defender DeviceProcessEvents
- Software inventory (CMDB)
sentinel_kql: "SecurityEvent\n| where TimeGenerated > ago(7d)\n| where EventID ==\
  \ 4688\n| where Account !endswith \"$\"\n| where NewProcessName endswith \"\\AnyDesk.exe\"\
  \n   or NewProcessName endswith \"\\TeamViewer.exe\"\n   or NewProcessName endswith\
  \ \"\\TeamViewer_Service.exe\"\n   or NewProcessName endswith \"\\ScreenConnect.ClientService.exe\"\
  \n   or NewProcessName endswith \"\\ConnectWiseControl.ClientService.exe\"\n   or\
  \ NewProcessName endswith \"\\atera_agent.exe\"\n   or NewProcessName endswith \"\
  \\SplashtopStreamer.exe\"\n   or NewProcessName endswith \"\\RustDesk.exe\"\n  \
  \ or NewProcessName endswith \"\\NinjaOne.exe\"\n| project TimeGenerated, Computer,\
  \ Account, NewProcessName,\n          CommandLine, ParentProcessName\n| order by\
  \ TimeGenerated desc\n"
