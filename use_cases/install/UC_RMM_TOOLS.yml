id: UC_RMM_TOOLS
title: RMM tool installed by non-IT user — remote-access utility for hands-on-keyboard
kill_chain: install
confidence: High
description: ConnectWise / AnyDesk / TeamViewer / ScreenConnect / Atera installed outside IT change windows = common tradecraft
  for ransomware affiliates and IT-helpdesk impersonators.
implementations:
- splunk
- defender
mitre_attack:
- id: T1219
  name: Remote Access Software
data_models:
  splunk:
  - Endpoint.Processes
  defender:
  - DeviceProcessEvents
splunk_spl: |-
  | tstats `summariesonly` count min(_time) as firstTime max(_time) as lastTime
      from datamodel=Endpoint.Processes
      where Processes.process_name IN ("AnyDesk.exe","TeamViewer.exe","TeamViewer_Service.exe",
          "ScreenConnect.ClientService.exe","ConnectWiseControl.ClientService.exe",
          "atera_agent.exe","SplashtopStreamer.exe","RustDesk.exe","NinjaOne.exe","kaseya*.exe")
      by Processes.dest, Processes.user, Processes.process_name, Processes.process, Processes.parent_process_name
  | `drop_dm_object_name(Processes)`
defender_kql: |-
  DeviceProcessEvents
  | where Timestamp > ago(7d)
  | where FileName in~ ("AnyDesk.exe","TeamViewer.exe","TeamViewer_Service.exe",
          "ScreenConnect.ClientService.exe","ConnectWiseControl.ClientService.exe",
          "atera_agent.exe","SplashtopStreamer.exe","RustDesk.exe","NinjaOne.exe")
     or FileName matches regex @"(?i)kaseya.*\.exe"
  | project Timestamp, DeviceName, AccountName, FileName, ProcessCommandLine
