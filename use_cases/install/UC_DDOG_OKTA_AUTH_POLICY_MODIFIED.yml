id: UC_DDOG_OKTA_AUTH_POLICY_MODIFIED
title: Okta authentication / sign-on policy modified
kill_chain: install
confidence: High
tier: alerting
fp_rate_estimate: low
implementations:
- datadog
mitre_attack:
- id: T1556
  name: Modify Authentication Process
description: |-
