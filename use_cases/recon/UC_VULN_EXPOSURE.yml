id: UC_VULN_EXPOSURE
title: Asset exposure — vulnerability matches article CVE(s)
kill_chain: recon
confidence: High
description: Match vulnerability scanner output to the CVE(s) named in the article.
implementations:
- splunk
- defender
mitre_attack:
- id: T1190
  name: Exploit Public-Facing Application
data_models:
  splunk:
  - Vulnerabilities
  defender:
  - DeviceInfo
  - DeviceTvmSoftwareVulnerabilities
splunk_spl: "| tstats `summariesonly` count min(_time) as firstTime max(_time) as lastTime\n    from datamodel=Vulnerabilities\n    where Vulnerabilities.signature IN (__CVE_LIST__)\n    by Vulnerabilities.dest, Vulnerabilities.signature, Vulnerabilities.severity, Vulnerabilities.cve\n| `drop_dm_object_name(Vulnerabilities)`\n| sort - severity"
defender_kql: 'DeviceTvmSoftwareVulnerabilities

  | where CveId in~ (__CVE_LIST__)

  | join kind=inner DeviceInfo on DeviceId

  | project DeviceName, OSPlatform, CveId, VulnerabilitySeverityLevel, RecommendedSecurityUpdate'
tier: alerting
fp_rate_estimate: low
required_telemetry:
- Tenable / Qualys / Rapid7 (CIM Vulnerabilities)
- Defender TVM (DeviceTvmSoftwareVulnerabilities)
