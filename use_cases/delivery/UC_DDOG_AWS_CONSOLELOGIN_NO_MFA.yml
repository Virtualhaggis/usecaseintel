description: |-
  AWS ConsoleLogin events for an identity that didn't use MFA, where the same principal also signed in from a geographically distant location within a tight window (impossible travel). Mirrors Datadog's default rule 'AWS ConsoleLogin without MFA triggered Impossible Travel scenario'.
datadog_query: |-
