id: UC_DDOG_AWS_CONSOLELOGIN_NO_MFA
title: AWS Console login without MFA + impossible travel
kill_chain: delivery
confidence: High
tier: alerting
fp_rate_estimate: low
implementations:
- datadog
mitre_attack:
- id: T1078
  name: Valid Accounts
- id: T1550
