id: UC_DDOG_CREDENTIAL_STUFFING
title: Credential-stuffing attack on application
kill_chain: delivery
confidence: High
tier: alerting
fp_rate_estimate: low
implementations:
- datadog
mitre_attack:
- id: T1110.004
  name: Credential Stuffing
- id: T1078
  name: Valid Accounts
description: |-
  Compromised credential pairs reused against a public application — high-volume login attempts where a small fraction succeed. Datadog default 'Credential Stuffing attack'.
datadog_query: |-
  source:application_logs (@http.url_details.path:*login* OR @http.url_details.path:*signin*)
  @http.method:POST @http.status_code:(200 OR 401 OR 403)
