id: UC_PHISH_LINK_BYPASS
title: User clicked through a Safe Links warning page
kill_chain: delivery
confidence: High
description: 'Microsoft Safe Links rendered a warning page for a URL and the user

  clicked past it anyway (ActionType=ClickedThrough). This is an

  explicit user-override of a defender control — by definition rare and

  high-signal. Investigate every hit; the URL was flagged for a reason.'
implementations:
- defender
mitre_attack:
- id: T1566.002
  name: Spearphishing Link
- id: T1204.001
  name: 'User Execution: Malicious Link'
data_models:
  defender:
  - UrlClickEvents
  - EmailEvents
defender_kql: "// Safe Links assessed the URL as risky, showed a warning page, and the\n// user proceeded anyway. ClickedThrough events are inherently rare —\n// every hit deserves analyst review.\nUrlClickEvents\n| where Timestamp > ago(30d)\n| where ActionType == \"ClickedThrough\"\n| join kind=leftouter (\n    EmailEvents\n    | where Timestamp > ago(30d)\n    | project NetworkMessageId, Subject, SenderFromAddress, SenderFromDomain,\n              RecipientEmailAddress, EmailDirection\n  ) on NetworkMessageId\n| project Timestamp, AccountUpn, IPAddress, Url, UrlDomain,\n          EmailDirection, SenderFromAddress, SenderFromDomain,\n          RecipientEmailAddress, Subject, Workload\n| order by Timestamp desc"
tier: alerting
fp_rate_estimate: low
required_telemetry:
- UrlClickEvents (ClickedThrough)
- Microsoft Defender for Office 365 Safe Links
