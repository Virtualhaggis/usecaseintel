id: UC_PHISH_LINK
title: Phishing-link click correlated to endpoint execution
kill_chain: delivery
confidence: High
description: 'User received an external email containing a URL, clicked it, and within

  60 seconds the recipient''s endpoint spawned a scripting interpreter or

  network downloader (PowerShell / cmd / mshta / curl / certutil / bitsadmin).

  This is the high-fidelity shape — a raw "user clicked an emailed URL"

  query is too noisy to alert on because every Microsoft 365 tenant

  generates thousands of legitimate clicks per day. The exec-correlation

  step suppresses the noise to roughly the rate at which a click actually

  drives onto-host execution, which is the actionable signal.

  Pair with UC_PHISH_LINK_BYPASS (Safe Links override) and UC_PHISH_LINK_NEWDOMAIN

  for orthogonal high-fidelity variants.'
implementations:
- splunk
- defender
mitre_attack:
- id: T1566.002
  name: Spearphishing Link
- id: T1204.001
  name: 'User Execution: Malicious Link'
- id: T1059.001
  name: PowerShell
data_models:
  splunk:
  - Email.All_Email
  - Web
  - Endpoint.Processes
  defender:
  - EmailEvents
  - EmailUrlInfo
  - UrlClickEvents
  - DeviceProcessEvents
splunk_spl: "``` Phishing-link click that drives endpoint execution within 60s ```\n| tstats `summariesonly` earliest(_time) AS click_time\n    from datamodel=Web\n    where Web.action=\"allowed\"\n    by Web.src, Web.user, Web.dest, Web.url\n| `drop_dm_object_name(Web)`\n| rename user AS recipient, dest AS clicked_domain, url AS clicked_url\n| join type=inner recipient\n    [| tstats `summariesonly` count\n         from datamodel=Email.All_Email\n         where All_Email.action=\"delivered\" AND All_Email.url!=\"-\"\n         by All_Email.recipient, All_Email.src_user, All_Email.url, All_Email.subject\n     | `drop_dm_object_name(All_Email)`\n     | rex field=url \"https?://(?<email_domain>[^/]+)\"\n     | rename recipient AS recipient]\n| join type=inner src\n    [| tstats `summariesonly` earliest(_time) AS exec_time\n         values(Processes.process) AS exec_cmd, values(Processes.process_name) AS exec_proc\n         from datamodel=Endpoint.Processes\n\
  \         where Processes.parent_process_name IN (\"chrome.exe\",\"msedge.exe\",\"firefox.exe\",\n                                                   \"outlook.exe\",\"brave.exe\",\"arc.exe\")\n           AND Processes.process_name IN (\"powershell.exe\",\"pwsh.exe\",\"cmd.exe\",\"mshta.exe\",\n                                            \"rundll32.exe\",\"regsvr32.exe\",\"wscript.exe\",\n                                            \"cscript.exe\",\"bitsadmin.exe\",\"certutil.exe\",\n                                            \"curl.exe\",\"wget.exe\")\n         by Processes.dest, Processes.user\n     | `drop_dm_object_name(Processes)`\n     | rename dest AS src]\n| eval delta_sec = exec_time - click_time\n| where delta_sec >= 0 AND delta_sec <= 60\n| table click_time, exec_time, delta_sec, recipient, src, src_user, subject,\n        clicked_domain, clicked_url, exec_proc, exec_cmd\n| sort - click_time"
defender_kql: "// Phishing-link click that drives endpoint execution within 60s.\n// Far higher fidelity than \"every clicked URL\" — most legitimate clicks\n// never spawn a non-browser child process, so the join eliminates the\n// 99% of noise that makes a raw click query unactionable.\nlet LookbackDays = 7d;\nlet SuspectClicks = UrlClickEvents\n    | where Timestamp > ago(LookbackDays)\n    | where ActionType in (\"ClickAllowed\",\"ClickedThrough\")\n    | join kind=inner (\n        EmailEvents\n        | where Timestamp > ago(LookbackDays)\n        | where DeliveryAction == \"Delivered\"\n        | where EmailDirection == \"Inbound\"\n        | project NetworkMessageId, Subject, SenderFromAddress, SenderFromDomain,\n                  RecipientEmailAddress, EmailTimestamp = Timestamp\n      ) on NetworkMessageId\n    | join kind=leftouter (\n        EmailUrlInfo | project NetworkMessageId, Url, UrlDomain\n      ) on NetworkMessageId, Url\n    | project ClickTime = Timestamp, AccountUpn,\
  \ IPAddress, Url, UrlDomain,\n              Subject, SenderFromAddress, SenderFromDomain, RecipientEmailAddress,\n              ActionType;\n// Correlate to a non-browser child process spawned within 60 seconds on\n// the recipient's device.\nDeviceProcessEvents\n| where Timestamp > ago(LookbackDays)\n| where InitiatingProcessFileName in~ (\"chrome.exe\",\"msedge.exe\",\"firefox.exe\",\n                                         \"outlook.exe\",\"brave.exe\",\"arc.exe\")\n| where FileName in~ (\"powershell.exe\",\"pwsh.exe\",\"cmd.exe\",\"mshta.exe\",\n                        \"rundll32.exe\",\"regsvr32.exe\",\"wscript.exe\",\"cscript.exe\",\n                        \"bitsadmin.exe\",\"certutil.exe\",\"curl.exe\",\"wget.exe\")\n| join kind=inner SuspectClicks on $left.AccountName == $right.AccountUpn\n| where Timestamp between (ClickTime .. ClickTime + 60s)\n| project ClickTime, ProcessTime = Timestamp,\n          DelaySec = datetime_diff('second', Timestamp, ClickTime),\n          DeviceName,\
  \ AccountName, RecipientEmailAddress, SenderFromAddress,\n          Subject, Url, UrlDomain, ActionType,\n          FileName, ProcessCommandLine, InitiatingProcessFileName\n| order by ClickTime desc"
tier: alerting
fp_rate_estimate: medium
required_telemetry:
- Microsoft 365 EmailEvents
- EmailUrlInfo
- UrlClickEvents
- Defender DeviceProcessEvents
